<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Mahasiswa — SiAbsen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<nav class="navbar px-4" style="height:var(--topbar-h); background:var(--green-dark);">
  <a class="navbar-brand fw-black text-white" href="dashboard.html">
    <span class="dot"></span>SiAbsen
  </a>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small"><i class="bi bi-person-circle me-1"></i><span id="topbar-username">Admin</span></span>
    <a href="#" class="text-white-50 small text-decoration-none" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</nav>

<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content animate-in">
    <h4 class="fw-black mb-1" style="color:var(--green-dark);">Data Mahasiswa</h4>
    <p class="text-muted small mb-4">Daftar seluruh mahasiswa yang terdaftar dalam sistem</p>

    <!-- Toolbar: Bootstrap Input Group + btn -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <div class="input-group" style="max-width:300px;">
        <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
        <input
          type="text"
          class="form-control border-start-0"
          placeholder="Cari NIM / Nama / Kelas..."
          oninput="onSearchMhs(this.value)"
        />
      </div>
      <a href="register.html" class="btn btn-success fw-semibold" style="background:var(--green-dark); border-color:var(--green-dark);">
        <i class="bi bi-plus-lg me-1"></i>Tambah Mahasiswa
      </a>
    </div>

    <!-- Bootstrap Table -->
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="text-uppercase small text-muted fw-semibold">#</th>
              <th class="text-uppercase small text-muted fw-semibold">NIM</th>
              <th class="text-uppercase small text-muted fw-semibold">Nama</th>
              <th class="text-uppercase small text-muted fw-semibold">Username</th>
              <th class="text-uppercase small text-muted fw-semibold">Kelas</th>
              <th class="text-uppercase small text-muted fw-semibold">Aksi</th>
            </tr>
          </thead>
          <tbody id="mhs-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  loadSidebar();
  populateTopbarUser();
  initMahasiswaPage();
</script>
</body>
</html>
