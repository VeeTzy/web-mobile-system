<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SiAbsen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<div class="login-page">
  <!-- Bootstrap Card -->
  <div class="card border-0 shadow-lg animate-in" style="width:100%; max-width:400px; border-radius:1.25rem !important; z-index:2;">
    <div class="card-body p-5">

      <!-- Logo -->
      <div class="text-center mb-4">
        <div class="login-icon-wrap mb-3">
          <i class="bi bi-calendar2-check-fill"></i>
        </div>
        <h4 class="fw-black mb-1" style="color:var(--green-dark);">SiAbsen</h4>
        <p class="text-muted small mb-0">Sistem Informasi Absensi Digital</p>
      </div>

      <!-- Alert Error (Bootstrap alert) -->
      <div class="alert alert-danger d-none py-2 small" id="login-error" role="alert"></div>

      <!-- Form -->
      <div class="mb-3">
        <label for="inp-username" class="form-label fw-semibold small">Username</label>
        <input
          type="text"
          class="form-control"
          id="inp-username"
          placeholder="Masukkan username..."
          autocomplete="username"
        />
      </div>

      <div class="mb-4">
        <label for="inp-password" class="form-label fw-semibold small">Password</label>
        <!-- Bootstrap Input Group untuk toggle password -->
        <div class="input-group">
          <input
            type="password"
            class="form-control"
            id="inp-password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button class="btn btn-outline-secondary" type="button" id="toggle-pass">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <!-- Bootstrap btn-primary (warna override via CSS var) -->
      <button
        class="btn btn-primary w-100 fw-bold py-2"
        style="background:var(--green-dark); border-color:var(--green-dark);"
        onclick="handleLogin()"
      >
        <i class="bi bi-box-arrow-in-right me-2"></i>LOGIN
      </button>

      <p class="text-center text-muted small mt-3 mb-0">
        Demo: <strong>admin</strong> / <strong>1234</strong>
      </p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
