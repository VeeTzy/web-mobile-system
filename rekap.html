<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekap Absensi — SiAbsen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body>

<nav class="navbar px-4" style="height:var(--topbar-h); background:var(--green-dark);">
  <a class="navbar-brand fw-black text-white" href="dashboard.html">
    <span class="dot"></span>SiAbsen
  </a>
  <div class="d-flex align-items-center gap-3">
    <span class="text-white-50 small"><i class="bi bi-person-circle me-1"></i><span id="topbar-username">Admin</span></span>
    <a href="#" class="text-white-50 small text-decoration-none" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  </div>
</nav>

<div class="app-shell">
  <div id="sidebar-container"></div>

  <main class="main-content animate-in">
    <h4 class="fw-black mb-1" style="color:var(--green-dark);">Rekap Absensi</h4>
    <p class="text-muted small mb-4">Statistik kehadiran per kelas — April 2026</p>

    <div class="row g-4">

      <!-- Bar Chart Card -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header bg-white border-bottom py-3">
            <span class="fw-bold" style="color:var(--green-dark);">Persentase Kehadiran per Kelas</span>
          </div>
          <div class="card-body" id="chart-bars">
            <!-- populated by app.js -->
          </div>
        </div>
      </div>

      <!-- Summary Table Card -->
      <div class="col-lg-6">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-header bg-white border-bottom py-3">
            <span class="fw-bold" style="color:var(--green-dark);">Ringkasan Bulan Ini</span>
          </div>
          <!-- Bootstrap Table Striped -->
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="text-uppercase small text-muted fw-semibold">Kelas</th>
                  <th class="text-uppercase small text-muted fw-semibold">Hadir / Total</th>
                  <th class="text-uppercase small text-muted fw-semibold">%</th>
                  <th class="text-uppercase small text-muted fw-semibold">Status</th>
                </tr>
              </thead>
              <tbody id="rekap-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  loadSidebar();
  populateTopbarUser();
  initRekapPage();
</script>
</body>
</html>
